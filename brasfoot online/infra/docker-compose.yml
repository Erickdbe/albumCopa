services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: brfut
      POSTGRES_PASSWORD: brfut
      POSTGRES_DB: brfut
    ports:
      - "5433:5432"
    volumes:
      - brfut_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - brfut_redis_data:/data

volumes:
  brfut_postgres_data:
  brfut_redis_data:
