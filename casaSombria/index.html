<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Casa Sombria</title>
  <link rel="icon" href="./Build/TemplateData/favicon.ico">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="game-shell" aria-label="Casa Sombria">
    <div id="gameContainer"></div>

    <section id="loader" class="loader" aria-live="polite">
      <div class="loader-mark" aria-hidden="true"></div>
      <strong>CASA SOMBRIA</strong>
      <div class="loader-track"><span id="loaderBar"></span></div>
      <small id="loaderText">Preparando a casa...</small>
    </section>

    <section id="loadError" class="load-error" hidden>
      <strong>O jogo nao conseguiu iniciar.</strong>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </section>

    <nav class="game-tools" aria-label="Navegacao do jogo">
      <a href="/Album/index.html" title="Voltar ao album" aria-label="Voltar ao album">&larr;</a>
      <button id="fullscreenButton" type="button" title="Tela cheia" aria-label="Tela cheia">&#x26F6;</button>
    </nav>
  </main>

  <script src="./Build/Build/UnityLoader.js"></script>
  <script>
    (function () {
      var loader = document.getElementById("loader");
      var loaderBar = document.getElementById("loaderBar");
      var loaderText = document.getElementById("loaderText");
      var loadError = document.getElementById("loadError");
      var gameInstance;

      function showError() {
        loader.hidden = true;
        loadError.hidden = false;
      }

      window.addEventListener("error", function (event) {
        if (/unity|wasm|asm|webgl/i.test(String(event.message || ""))) showError();
      });

      try {
        gameInstance = UnityLoader.instantiate("gameContainer", "./Build/Build/Build.json", {
          onProgress: function (_instance, progress) {
            var percent = Math.round(progress * 100);
            loaderBar.style.width = percent + "%";
            loaderText.textContent = percent < 100 ? "Carregando " + percent + "%" : "Entrando...";
            if (progress >= 1) {
              window.setTimeout(function () { loader.hidden = true; }, 350);
            }
          }
        });
      } catch (_error) {
        showError();
      }

      document.getElementById("fullscreenButton").addEventListener("click", function () {
        if (gameInstance) gameInstance.SetFullscreen(1);
      });
    }());
  </script>
</body>
</html>
