server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router uses client-side routes (/dashboard, /login, ...) — any
    # path nginx doesn't recognize as a static file falls back to
    # index.html so the client-side router can handle it, instead of a
    # raw 404 on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
