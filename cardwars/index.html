<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Card Wars Solo</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="battle-stage" aria-label="Card Wars">
    <section class="arena" aria-label="Campo de batalha">
      <div class="room-layer"></div>
      <div class="table-layer"></div>
      <div class="grass-board"></div>

      <header class="match-menu">
        <select id="deckFaction" aria-label="Faccao do deck">
          <option value="Mixed">Deck misto</option>
          <option value="Corn">Corn</option>
          <option value="Cotton">Cotton</option>
          <option value="Plains">Plains</option>
          <option value="Sand">Sand</option>
          <option value="Swamp">Swamp</option>
        </select>
        <button id="newGameBtn" type="button">Nova</button>
        <button id="soundBtn" type="button" aria-pressed="false">Som</button>
        <a class="back-link" href="/">Album</a>
      </header>

      <section class="hero-hud enemy-hud" aria-label="CPU">
        <div class="magic-orb"><strong id="cpuActions">0</strong></div>
        <div class="portrait-frame king">
          <img src="/CardWars-main/CardWars-main/Assets/Texture2D/Jake_Face.png" alt="">
        </div>
        <div class="deck-fan" aria-hidden="true">
          <img src="/CardWars-main/CardWars-main/Assets/Texture2D/Card_Back.png" alt="">
          <img src="/CardWars-main/CardWars-main/Assets/Texture2D/Card_Back.png" alt="">
          <img src="/CardWars-main/CardWars-main/Assets/Texture2D/Card_Back.png" alt="">
        </div>
        <div class="hero-bars">
          <strong id="cpuHero">45 HP</strong>
          <small><span id="cpuDeck">0 deck</span> | <span id="cpuDiscard">0 descarte</span></small>
        </div>
      </section>

      <section class="field-lanes enemy-row" id="enemyLanes" aria-label="Lanes da CPU"></section>
      <section class="field-lanes player-row" id="playerLanes" aria-label="Suas lanes"></section>

      <section class="hero-hud player-hud" aria-label="Voce">
        <div class="magic-orb"><strong id="playerActions">0</strong></div>
        <div class="portrait-frame">
          <img src="/CardWars-main/CardWars-main/Assets/Texture2D/Jake_Face.png" alt="">
        </div>
        <div class="deck-fan" aria-hidden="true">
          <img src="/CardWars-main/CardWars-main/Assets/Texture2D/Card_Back.png" alt="">
          <img src="/CardWars-main/CardWars-main/Assets/Texture2D/Card_Back.png" alt="">
          <img src="/CardWars-main/CardWars-main/Assets/Texture2D/Card_Back.png" alt="">
        </div>
        <div class="hero-bars">
          <strong id="playerHero">45 HP</strong>
          <small><span id="playerDeck">0 deck</span> | <span id="playerDiscard">0 descarte</span></small>
        </div>
      </section>

      <div class="speech-bubble" aria-live="polite">
        <strong id="turnBadge">Carregando</strong>
        <span id="statusLine">Lendo recursos do projeto Unity...</span>
      </div>

      <div class="hand-dock" aria-label="Mao">
        <div class="hand" id="hand"></div>
      </div>

      <nav class="command-wheel" aria-label="Acoes">
        <button id="playCardBtn" type="button" disabled>Jogar</button>
        <button id="floopBtn" type="button" disabled>Floop</button>
        <button id="battleBtn" type="button" disabled>GO</button>
      </nav>

      <aside class="right-rail" aria-label="Deck e registro">
        <div class="rail-slots" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <details>
          <summary>Cartas</summary>
          <div class="asset-stats" id="assetStats">
            <span>0 criaturas</span>
            <span>0 predios</span>
            <span>0 spells</span>
          </div>
          <div class="catalog-tools">
            <input id="cardSearch" type="search" placeholder="Buscar carta" autocomplete="off">
            <select id="catalogFilter" aria-label="Filtro do catalogo">
              <option value="all">Tudo</option>
              <option value="creature">Criaturas</option>
              <option value="building">Predios</option>
              <option value="spell">Spells</option>
            </select>
          </div>
          <div class="catalog" id="catalog"></div>
        </details>
        <details open>
          <summary>Registro</summary>
          <ol class="event-log" id="eventLog"></ol>
        </details>
      </aside>
    </section>
  </main>

  <template id="missingArtTemplate">
    <div class="missing-art">CW</div>
  </template>

  <script src="./game.js"></script>
</body>
</html>
