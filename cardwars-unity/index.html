<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Card Wars</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #050606;
      }

      .webgl-content {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        transform: none;
        background: #050606;
      }

      #gameContainer {
        width: min(100vw, 160vh);
        height: min(100vh, 62.5vw);
        background: #000;
      }

      #gameContainer canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .fullscreen {
        position: fixed;
        right: 12px;
        bottom: 12px;
        width: 38px;
        height: 38px;
        cursor: pointer;
        opacity: .8;
        background: rgba(0, 0, 0, .38) url("TemplateData/fullscreen.png") center / 28px no-repeat;
      }
    </style>
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="Build/UnityLoader.js"></script>
  </head>
  <body>
    <div class="webgl-content">
      <div id="gameContainer"></div>
      <button class="fullscreen" type="button" aria-label="Tela cheia" onclick="gameInstance.SetFullscreen(1)"></button>
    </div>
    <script>
      var gameInstance = UnityLoader.instantiate("gameContainer", "Build/cardwars-unity.json", {
        onProgress: UnityProgress
      });
    </script>
  </body>
</html>
