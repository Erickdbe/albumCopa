<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fazenda Pixel Online</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="farm-shell">
    <header class="farm-topbar">
      <div>
        <p class="farm-kicker">Modo persistente</p>
        <h1>Fazenda Pixel</h1>
      </div>
      <div class="farm-statline">
        <span>Moedas <strong id="coinsLabel">0</strong></span>
        <span>Nivel <strong id="levelLabel">1</strong></span>
        <span>XP <strong id="xpLabel">0</strong></span>
      </div>
      <button class="farm-btn secondary" id="backAlbum" type="button">Album</button>
    </header>

    <section class="farm-layout">
      <div class="farm-canvas-wrap">
        <canvas id="farmCanvas" width="960" height="600" aria-label="Mapa da Fazenda Pixel"></canvas>
        <div class="farm-toast" id="farmToast"></div>
      </div>

      <aside class="farm-panel">
        <section>
          <h2>Jogador</h2>
          <div class="farm-user" id="userLabel">Carregando...</div>
          <p class="farm-help">WASD ou setas movem. Clique em terreno, recurso ou comerciante para agir.</p>
        </section>

        <section>
          <h2>Ferramentas</h2>
          <div class="tool-grid" id="toolsPanel"></div>
        </section>

        <section>
          <h2>Inventario</h2>
          <div class="inventory-grid" id="inventoryPanel"></div>
        </section>

        <section>
          <h2>Selecionado</h2>
          <div class="selection-card" id="selectionPanel">Clique em algo no mapa.</div>
          <div class="action-grid" id="actionPanel"></div>
        </section>

        <section>
          <h2>Comerciante</h2>
          <div class="shop-grid" id="shopPanel"></div>
        </section>
      </aside>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
